<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TC Generator</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>
  <div class="container">
    <h1>Transfer Certificate Generator</h1>
    <form action="/generate" method="POST">
      <label>Name:</label><input type="text" name="name" required><br>
      <label>USN:</label><input type="text" name="usn" required><br>
      <label>Branch:</label><input type="text" name="branch" required><br>
      <label>Year of Joining:</label><input type="number" name="year_of_join" required><br>
      <label>Year of Exit:</label><input type="number" name="year_of_exit" required><br>
      <label>Reason for Leaving:</label><input type="text" name="reason" required><br>
      <label>Class:</label><input type="text" name="class" required><br>
      <label>Semester:</label><input type="number" name="semester" required><br>
      <label>Academic Year:</label><input type="text" name="academic_year" required><br>
      <label>CGPA/Percentage:</label><input type="text" name="performance" required><br>
      <button type="submit">Generate TC</button>
    </form>
  </div>
</body>
</html>
